syntax = "proto3";

service CustomerService {
    rpc GetAll (Empty) returns (CustomerList) {};
    rpc Get (CustomerReqID) returns (Customer) {};
    rpc Insert (Customer) returns (Customer) {};
    rpc Update (Customer) returns (Customer) {};
    rpc Remove (CustomerReqId) returns (Empty) {};
}

message Empty {}

message CustomerReqId {
    string id = 1
}

message CustomerList {
    repeated Customer customers = 1;
}

message Customer {
    string id:1;
    string name : 2;
    string address: 3;
    int32 age = 4
}


